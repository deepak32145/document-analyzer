<!-- Global spinner overlay -->
<div class="spinner-overlay" *ngIf="showSpinner">
  <div class="spinner-box">
    <div class="spinner"></div>
    <p class="spinner-label">Please wait…</p>
  </div>
</div>

<!-- ── Credit Card Onboarding Screen ── -->
<div class="relay-screen onboarding-screen" *ngIf="view === 'onboarding'">
  <div class="relay-header">
    <span class="brand-icon">R</span>
    <span class="brand-name">Relay</span>
  </div>
  <div class="onboarding-body">
    <div class="onboarding-card">
      <div class="cc-icon">💳</div>
      <h1 class="onboarding-title">Credit Card Onboarding</h1>
      <p class="onboarding-subtitle">Let's start your credit card onboarding journey</p>
      <p class="onboarding-hint">Sign in with your Online Banking credentials to get started.</p>
      <button class="btn-primary" (click)="startLogin()">Login</button>
    </div>
  </div>
</div>

<!-- ── OLB Login Screen ── -->
<div class="relay-screen login-screen" *ngIf="view === 'login'">
  <div class="relay-header">
    <span class="brand-icon">R</span>
    <span class="brand-name">Relay</span>
    <span class="header-divider"></span>
    <span class="header-sub">Online Banking</span>
  </div>
  <div class="login-body">
    <div class="login-card">
      <h2 class="login-title">OLB Login Screen</h2>
      <p class="login-subtitle">Enter your online banking credentials to continue.</p>

      <div class="form-group" [class.has-error]="loginError">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          placeholder="Enter username"
          (keydown.enter)="submitLogin()"
        />
      </div>

      <div class="form-group" [class.has-error]="loginError">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          placeholder="Enter password"
          (keydown.enter)="submitLogin()"
        />
      </div>

      <p class="login-error" *ngIf="loginError">{{ loginError }}</p>

      <button class="btn-primary" (click)="submitLogin()">Sign In</button>
    </div>
  </div>
</div>

<!-- ── Existing Business Flow ── -->
<app-business-flow *ngIf="view === 'flow'" useCase="relay"></app-business-flow>
