<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <defs>
    <linearGradient id="cardGradP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6e;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1e5fa8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2e5c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chipG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#f5d76e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Card body -->
  <rect width="480" height="300" rx="18" ry="18" fill="url(#cardGradP)" filter="url(#shadow)"/>

  <!-- Shimmer overlay -->
  <ellipse cx="360" cy="60" rx="200" ry="140" fill="rgba(255,255,255,0.06)"/>

  <!-- Horizontal stripe -->
  <rect y="100" width="480" height="50" fill="rgba(255,255,255,0.04)"/>

  <!-- EMV Chip -->
  <rect x="36" y="100" width="52" height="40" rx="6" fill="url(#chipG)"/>
  <line x1="36" y1="115" x2="88" y2="115" stroke="#b8972c" stroke-width="1"/>
  <line x1="36" y1="125" x2="88" y2="125" stroke="#b8972c" stroke-width="1"/>
  <line x1="36" y1="135" x2="88" y2="135" stroke="#b8972c" stroke-width="1"/>
  <line x1="55" y1="100" x2="55" y2="140" stroke="#b8972c" stroke-width="1"/>
  <line x1="68" y1="100" x2="68" y2="140" stroke="#b8972c" stroke-width="1"/>

  <!-- Contactless symbol -->
  <path d="M108 117 Q115 120 108 123" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
  <path d="M113 112 Q124 120 113 128" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"/>
  <path d="M118 107 Q133 120 118 133" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>

  <!-- Card number -->
  <text x="36" y="188" font-family="'Courier New', monospace" font-size="22" fill="rgba(255,255,255,0.9)" letter-spacing="3">4821  ••••  ••••  7364</text>

  <!-- Expiry -->
  <text x="36" y="224" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="1">VALID THRU</text>
  <text x="36" y="240" font-family="'Courier New', monospace" font-size="16" fill="rgba(255,255,255,0.9)" letter-spacing="2">03/28</text>

  <!-- Cardholder name -->
  <text x="36" y="272" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)" letter-spacing="1.5" font-weight="600">JOHN MITCHELL</text>

  <!-- Star/points badge top-right -->
  <circle cx="420" cy="54" r="34" fill="rgba(255,255,255,0.1)"/>
  <text x="420" y="46" font-size="22" text-anchor="middle" fill="#f5d76e">★</text>
  <text x="420" y="62" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="Arial" font-weight="700" letter-spacing="0.5">POINTS</text>

  <!-- Network logo (Visa-style) -->
  <text x="400" y="272" font-family="Arial, sans-serif" font-size="26" font-weight="900" font-style="italic" fill="rgba(255,255,255,0.9)" letter-spacing="-1">VISA</text>

  <!-- Card name top-left -->
  <text x="36" y="46" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.95)" letter-spacing="0.5">Citizens Bank</text>
  <text x="36" y="65" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.65)" letter-spacing="0.3">Business Everyday Points</text>
</svg>
